<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1118"/>
      <stop offset="50%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b9b"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="950" cy="150" r="200" fill="#ff6b9b" opacity="0.08"/>
  <circle cx="1050" cy="500" r="150" fill="#60a5fa" opacity="0.06"/>
  <circle cx="100" cy="550" r="120" fill="#ff6b9b" opacity="0.05"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Logo -->
  <rect x="80" y="180" width="70" height="70" rx="18" fill="url(#accent)"/>
  <text x="115" y="228" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle">W</text>
  
  <!-- Title -->
  <text x="170" y="210" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="56" font-weight="800" fill="white">Wolffy</text>
  <text x="170" y="255" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" fill="#9aa6bb">Apple / iOS Toolkit</text>
  
  <!-- Feature tags -->
  <g transform="translate(80, 310)">
    <rect width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="90" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">💰 Price Compare</text>
    
    <rect x="200" width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="290" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">🎁 Free Apps</text>
    
    <rect x="400" width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="490" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">🔍 IAP Lookup</text>
    
    <rect x="600" width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="690" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">🛡️ Security</text>
  </g>
  
  <!-- Second row tags -->
  <g transform="translate(80, 370)">
    <rect width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="90" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">📚 Guides</text>
    
    <rect x="200" width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="290" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">✅ Checklists</text>
    
    <rect x="400" width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="490" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">📖 Glossary</text>
    
    <rect x="600" width="180" height="44" rx="12" fill="#1f2937" stroke="#293244" stroke-width="1"/>
    <text x="690" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#edf2ff" text-anchor="middle">⚠️ Risk Check</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="530" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" fill="#697386" text-anchor="middle">souk.eu.org</text>
  
  <!-- Bottom accent line -->
  <rect x="80" y="570" width="1040" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
